<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ─── Dashboard Layout ───────────────────── */
    .app {
      display: flex;
      min-height: 100vh;
      background: var(--bg-primary);
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 10;
      transition: transform 0.3s ease;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
      padding: 0 8px;
    }

    .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .logo-text { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--text-primary); }

    .sidebar-user {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: var(--card-bg);
      border-radius: 14px;
      border: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      color: white;
      font-size: 16px;
      flex-shrink: 0;
    }

    .user-info .user-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .user-info .user-email { font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }

    .sidebar-nav { flex: 1; }
    .nav-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; padding: 0 8px; margin-bottom: 8px; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all 0.2s;
      margin-bottom: 4px;
      text-decoration: none;
    }

    .nav-item:hover { background: var(--hover); color: var(--text-primary); }
    .nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
    .nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }

    .sidebar-bottom { padding-top: 20px; border-top: 1px solid var(--border); }

    .btn-logout {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #f87171;
      background: none;
      border: none;
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
    }

    .btn-logout:hover { background: rgba(239, 68, 68, 0.1); }

    /* Main Content */
    .main {
      margin-left: 260px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: between;
      gap: 16px;
      background: var(--bg-primary);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .topbar-left { flex: 1; }
    .page-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--text-primary); }
    .page-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

    .topbar-right { display: flex; align-items: center; gap: 12px; }

    .theme-btn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .theme-btn:hover { border-color: var(--accent); }

    .hamburger {
      display: none;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      cursor: pointer;
      font-size: 18px;
      align-items: center;
      justify-content: center;
    }

    /* Content */
    .content { padding: 32px; flex: 1; }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 22px;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--stat-color, var(--accent));
      border-radius: 16px 16px 0 0;
    }

    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 10px 30px var(--shadow); }

    .stat-icon { font-size: 24px; margin-bottom: 12px; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; color: var(--text-primary); line-height: 1; }
    .stat-label { font-size: 13px; color: var(--text-muted); margin-top: 6px; }

    .stat-card.total   { --stat-color: #6366f1; }
    .stat-card.pending { --stat-color: #f59e0b; }
    .stat-card.progress { --stat-color: #3b82f6; }
    .stat-card.done   { --stat-color: #10b981; }

    /* Task Section */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .section-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text-primary); }

    .btn-add {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-add:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-shadow); }

    /* Filters */
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    .search-input:focus { outline: none; border-color: var(--accent); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; pointer-events: none; }

    .filter-select {
      padding: 10px 14px;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .filter-select:focus { outline: none; border-color: var(--accent); }

    /* Tasks List */
    .tasks-list { display: flex; flex-direction: column; gap: 10px; }

    .task-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: all 0.2s;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .task-card:hover { border-color: var(--accent); box-shadow: 0 4px 20px var(--shadow); }
    .task-card.completed-card { opacity: 0.6; }
    .task-card.completed-card .task-title { text-decoration: line-through; color: var(--text-muted); }

    .task-checkbox {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      transition: all 0.2s;
      background: transparent;
    }

    .task-checkbox.checked { background: #10b981; border-color: #10b981; }
    .task-checkbox:hover { border-color: var(--accent); }

    .task-body { flex: 1; min-width: 0; }

    .task-title { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .task-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .task-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-priority-high   { background: rgba(239, 68, 68, 0.15);  color: #f87171; }
    .badge-priority-medium { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
    .badge-priority-low    { background: rgba(16, 185, 129, 0.15); color: #34d399; }
    .badge-status-pending     { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
    .badge-status-in-progress { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
    .badge-status-completed   { background: rgba(16, 185, 129, 0.15); color: #34d399; }
    .badge-cat { background: var(--bg-secondary); color: var(--text-muted); }

    .task-due { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
    .task-due.overdue { color: #f87171; }

    .task-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .btn-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .btn-icon:hover { border-color: var(--accent); background: var(--hover); }
    .btn-icon.delete:hover { border-color: #f87171; background: rgba(239, 68, 68, 0.1); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 18px; color: var(--text-secondary); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      animation: modalIn 0.3s ease;
    }

    @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: var(--text-primary); }

    .btn-close {
      width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg-secondary); cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; color: var(--text-muted);
    }

    .btn-close:hover { background: var(--hover); color: var(--text-primary); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 7px; }

    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 11px 14px;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }

    .form-textarea { resize: vertical; min-height: 80px; }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

    .btn-secondary {
      padding: 11px 20px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg-secondary); color: var(--text-secondary);
      font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .btn-secondary:hover { background: var(--hover); }

    .btn-submit {
      padding: 11px 24px; border-radius: 10px; border: none;
      background: var(--accent); color: white;
      font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Syne', sans-serif;
      transition: all 0.2s;
    }

    .btn-submit:hover { box-shadow: 0 6px 20px var(--accent-shadow); transform: translateY(-1px); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 100;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      box-shadow: 0 10px 30px var(--shadow);
      display: flex;
      align-items: center;
      gap: 10px;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s ease;
      max-width: 300px;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: #10b981; }
    .toast.error   { border-color: #f87171; }

    /* Mobile sidebar overlay */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .main { margin-left: 0; }
      .hamburger { display: flex; }
      .content { padding: 20px 16px; }
      .topbar { padding: 16px 20px; }
      .form-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .task-actions { display: none; }
      .task-card:active .task-actions { display: flex; }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- Sidebar Overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">✅</div>
      <span class="logo-text">TaskFlow</span>
    </div>

    <div class="sidebar-user">
      <div class="user-avatar" id="sidebar-avatar">?</div>
      <div class="user-info">
        <div class="user-name" id="sidebar-name">Loading...</div>
        <div class="user-email" id="sidebar-email">...</div>
      </div>
    </div>

    <div class="sidebar-nav">
      <div class="nav-label">Menu</div>
      <a class="nav-item active" onclick="showSection('tasks')">
        <span class="nav-icon">📋</span> All Tasks
      </a>
      <a class="nav-item" onclick="filterByStatus('pending')">
        <span class="nav-icon">⏳</span> Pending
      </a>
      <a class="nav-item" onclick="filterByStatus('in-progress')">
        <span class="nav-icon">🔄</span> In Progress
      </a>
      <a class="nav-item" onclick="filterByStatus('completed')">
        <span class="nav-icon">✅</span> Completed
      </a>
    </div>

    <div class="sidebar-bottom">
      <button class="btn-logout" onclick="logout()">🚪 Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="page-title" id="page-title">My Tasks</div>
        <div class="page-subtitle" id="page-date"></div>
      </div>
      <div class="topbar-right">
        <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
          <span id="theme-icon">☀️</span>
        </button>
        <button class="hamburger" onclick="openSidebar()">☰</button>
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card total">
          <div class="stat-icon">📦</div>
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">Total Tasks</div>
        </div>
        <div class="stat-card pending">
          <div class="stat-icon">⏳</div>
          <div class="stat-value" id="stat-pending">0</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card progress">
          <div class="stat-icon">🔄</div>
          <div class="stat-value" id="stat-progress">0</div>
          <div class="stat-label">In Progress</div>
        </div>
        <div class="stat-card done">
          <div class="stat-icon">✅</div>
          <div class="stat-value" id="stat-done">0</div>
          <div class="stat-label">Completed</div>
        </div>
      </div>

      <!-- Tasks Section -->
      <div class="section-header">
        <div class="section-title">Tasks</div>
        <button class="btn-add" onclick="openAddModal()">＋ Add Task</button>
      </div>

      <!-- Filters -->
      <div class="filters">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="search-input" placeholder="Search tasks..." oninput="handleSearch()" />
        </div>
        <select class="filter-select" id="filter-status" onchange="loadTasks()">
          <option value="all">All Status</option>
          <option value="pending">Pending</option>
          <option value="in-progress">In Progress</option>
          <option value="completed">Completed</option>
        </select>
        <select class="filter-select" id="filter-priority" onchange="loadTasks()">
          <option value="all">All Priority</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <select class="filter-select" id="filter-sort" onchange="loadTasks()">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="due-date">By Due Date</option>
          <option value="title">By Title</option>
        </select>
      </div>

      <!-- Tasks List -->
      <div class="tasks-list" id="tasks-list">
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <h3>Loading tasks...</h3>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Add/Edit Task Modal -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add New Task</div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>

    <form id="task-form" onsubmit="handleTaskSubmit(event)">
      <input type="hidden" id="task-id" />

      <div class="form-group">
        <label class="form-label">Task Title *</label>
        <input type="text" class="form-input" id="task-title" placeholder="What needs to be done?" required maxlength="100" />
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="task-desc" placeholder="Optional details..." maxlength="500"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select class="form-select" id="task-priority">
            <option value="low">🟢 Low</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="high">🔴 High</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-select" id="task-category">
            <option value="work">💼 Work</option>
            <option value="personal">👤 Personal</option>
            <option value="health">❤️ Health</option>
            <option value="finance">💰 Finance</option>
            <option value="education">📚 Education</option>
            <option value="other" selected>📌 Other</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Due Date</label>
          <input type="date" class="form-input" id="task-due" />
        </div>
        <div class="form-group" id="status-group" style="display:none;">
          <label class="form-label">Status</label>
          <select class="form-select" id="task-status">
            <option value="pending">⏳ Pending</option>
            <option value="in-progress">🔄 In Progress</option>
            <option value="completed">✅ Completed</option>
          </select>
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn-submit" id="modal-submit-btn">Add Task</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast">
  <span id="toast-icon">✅</span>
  <span id="toast-msg">Success!</span>
</div>

<script src="js/dashboard.js"></script>
<script src="js/tasks.js"></script>
</body>
</html>
