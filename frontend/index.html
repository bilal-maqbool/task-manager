<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ─── Auth Page Specific ─────────────────── */
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: var(--bg-primary);
    }

    .auth-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, var(--accent-glow) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, var(--accent2-glow) 0%, transparent 50%);
      z-index: 0;
    }

    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
      opacity: 0.4;
    }

    .auth-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 80px var(--shadow);
      animation: slideUp 0.5s ease forwards;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .auth-title {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .auth-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    /* Tab Switcher */
    .auth-tabs {
      display: flex;
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 9px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.25s;
      border: none;
      background: none;
    }

    .auth-tab.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 12px var(--accent-shadow);
    }

    /* Forms */
    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .form-group { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 13px 16px;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .form-input::placeholder { color: var(--text-muted); }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      margin-top: 8px;
    }

    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px var(--accent-shadow); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .theme-toggle-auth {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
    }
  </style>
</head>
<body>

  <!-- Theme Toggle -->
  <div class="theme-toggle-auth">
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
      <span id="theme-icon">☀️</span>
    </button>
  </div>

  <div class="auth-page">
    <div class="auth-bg"></div>
    <div class="grid-overlay"></div>

    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">✅</div>
        <span class="logo-text">TaskFlow</span>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in or create an account to manage your tasks</p>

      <!-- Tab Switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Error Message -->
      <div class="error-msg" id="auth-error"></div>

      <!-- Login Form -->
      <form class="auth-form active" id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="login-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="login-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary" id="login-btn">Sign In →</button>
      </form>

      <!-- Signup Form -->
      <form class="auth-form" id="signup-form" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="signup-name" placeholder="Your name" required />
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="signup-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password (min 6 chars)</label>
          <input type="password" class="form-input" id="signup-password" placeholder="••••••••" required minlength="6" />
        </div>
        <button type="submit" class="btn-primary" id="signup-btn">Create Account →</button>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
